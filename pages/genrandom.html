<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダム文字列・SHA-256ツール</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1, h2 {
      color: #333;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      margin: 8px 0;
      font-size: 16px;
    }

    input[type="number"] {
      width: 100px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .box {
      margin-bottom: 40px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .result {
      margin-top: 15px;
      padding: 10px;
      background: #f5f5f5;
      word-break: break-all;
      border-radius: 5px;
      min-height: 24px;
    }
  </style>
</head>
<body>

<h1>ランダム文字列・SHA-256ツール</h1>

<div class="box">
  <h2>① ランダム文字列生成</h2>

  <label>
    文字数：
    <input type="number" id="length" value="16" min="1" max="256">
  </label>

  <br>

  <button id="generateBtn">生成</button>

  <div class="result" id="result"></div>
</div>

<div class="box">
  <h2>② SHA-256 ハッシュ化</h2>

  <input
    type="text"
    id="plainText"
    placeholder="文字列を入力">

  <button id="hashBtn">ハッシュ化</button>

  <div class="result" id="hashResult"></div>
</div>

<div class="box">
  <h2>③ SHA-256 ハッシュ照合</h2>

  <input
    type="text"
    id="verifyText"
    placeholder="元の文字列">

  <textarea
    id="verifyHash"
    rows="4"
    placeholder="SHA-256ハッシュを入力"></textarea>

  <button id="verifyBtn">照合</button>

  <div class="result" id="verifyResult"></div>
</div>

<script src="script.js"></script>
<script src="hash.js"></script>

</body>
</html>
